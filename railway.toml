[build]
  dockerfilePath = "Dockerfile"

[deploy]
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 3

[variables]
  NODE_ENV = "production"
  PORT = "3000"
  ANTHROPIC_API_KEY = ""
  NANO_BANANA_API_KEY = ""
  VIDEO_PROVIDER = "kling"
  KLING_API_KEY = ""
  RUNWAY_API_KEY = ""
  HIGGSFIELD_API_KEY = ""
  INSTAGRAM_USER_ID = ""
  INSTAGRAM_ACCESS_TOKEN = ""
  YOUTUBE_API_KEY = ""
  YOUTUBE_CLIENT_ID = ""
  YOUTUBE_CLIENT_SECRET = ""
  YOUTUBE_REFRESH_TOKEN = ""
  FACEBOOK_PAGE_ID = ""
  FACEBOOK_PAGE_ACCESS_TOKEN = ""
  TELEGRAM_BOT_TOKEN = ""
  TELEGRAM_CHANNEL_ID = ""
  ADMIN_TELEGRAM_CHAT_ID = ""
  ADMIN_PASSWORD = ""
